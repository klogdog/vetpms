    <script>
      class VetPMSTester {
        constructor() {
          this.results = [];
        }

        assert(condition, message) {
          this.currentTest.assertions.push({
            message,
            passed: !!condition,
          });
          if (!condition) this.currentTest.passed = false;
        }

        assertEqual(actual, expected, message) {
          const passed = actual === expected;
          this.currentTest.assertions.push({
            message: `${message} (Actual: "${actual}", Expected: "${expected}")`,
            passed,
          });
          if (!passed) this.currentTest.passed = false;
        }

        runTest(name, category, description, fn) {
          this.currentTest = {
            name,
            category,
            description,
            assertions: [],
            passed: true,
          };

          try {
            fn();
          } catch (e) {
            this.currentTest.passed = false;
            this.currentTest.assertions.push({
              message: `FATAL EXCEPTION: ${e.message}\nStack: ${e.stack}`,
              passed: false,
            });
          }

          this.results.push(this.currentTest);
        }
      }

      function runAllTests() {
        const tester = new VetPMSTester();
        const app = window.vetApp;

        if (!app) {
          alert('VetApp failed to load. Run index.html first to ensure dependencies exist.');
          return;
        }

        // RESET STATE BEFORE RUNNING TESTS
        app.state.animals = JSON.parse(JSON.stringify(app.state.animals));

        // ----------------------------------------------------
        // TEST 1: BITEMPORAL MANY-TO-MANY SHARED CUSTODY
        // ----------------------------------------------------
        tester.runTest(
          'Bitemporal Shared Custody splits',
          'Data Model',
          'Verifies that ownership custody profiles, billing weights, and communication opt-outs resolve accurately across divorced shared-custody parties.',
          () => {
            const oDetails = app.getOwnershipDetails('pet-1'); // Oliver Feline
            tester.assertEqual(oDetails.length, 2, 'Oliver must be co-owned by 2 distinct parties');

            const primaryBill = oDetails.find((o) => o.billing === true);
            tester.assertEqual(
              primaryBill.ownerName,
              'Sarah Connor',
              'Sarah Connor must be registered as primary billing party'
            );
            tester.assertEqual(
              primaryBill.share,
              80,
              "Sarah Connor's billing custody share must equal 80%"
            );

            const secondaryComms = oDetails.find((o) => o.share === 20);
            tester.assertEqual(
              secondaryComms.ownerName,
              'John Connor',
              'John Connor registered as co-owner'
            );
            tester.assertEqual(
              secondaryComms.communication,
              true,
              'John Connor has active communication consent flags'
            );
          }
        );

        // ----------------------------------------------------
        // TEST 2: VACCINES DUE DATE RULE & RABIES Form 51 SITE
        // ----------------------------------------------------
        tester.runTest(
          'Form 51 Site compliance rules',
          'Regulatory Certs',
          'Asserts that Rabies vaccinations apply right hind-limb localizations to cats to prevent vaccine-site sarcomas.',
          () => {
            const ehr = window.vetpmsEHR;
            const oliver = app.getPatient('pet-1'); // Feline
            const duke = app.getPatient('pet-4'); // Canine

            // Verify rabies cert and feline site SQ injection site rules
            const container = document.getElementById('rabies-modal-content');
            container.innerHTML = '';

            ehr.openRabiesCertificate(oliver);
            let html = container.innerHTML;
            tester.assert(
              html.includes('Right Hind Limb SQ (AAFP Guideline)'),
              'Feline Rabies must localize to Right Hind Limb SQ'
            );

            ehr.openRabiesCertificate(duke);
            html = container.innerHTML;
            tester.assert(
              html.includes('Right Shoulder SQ'),
              'Canine Rabies must localize to Right Shoulder SQ'
            );

            container.innerHTML = ''; // clean up
          }
        );

        // ----------------------------------------------------
        // TEST 3: PLUMB'S DOSING WARNINGS - MDR1 PHARMACOGENOMIC LOCK
        // ----------------------------------------------------
        tester.runTest(
          'Homozygous MDR1 Mutation block',
          "Plumb's Dose Engine",
          'Verifies that macrocyclic lactones are blocked if administered at mange-clearing rates (>150mcg/kg) in dogs with homozygous ABCB1 mutations.',
          () => {
            const max = app.getPatient('pet-3'); // Collie Cross with MDR1 warnings

            // Mock dosing inputs and set active patient
            app.activePatientId = max.id;

            const drugSelect = document.getElementById('dose-drug-select');
            drugSelect.innerHTML = `<option value="Ivermectin">Ivermectin</option>`;
            drugSelect.value = 'Ivermectin';

            const rateInput = document.getElementById('dose-rate-input');
            rateInput.value = 300; // Mange clearance dose rate

            const resultsBox = document.getElementById('dose-calculator-result');
            resultsBox.innerHTML = '';

            // Force calculation
            const ehr = window.vetpmsEHR;
            ehr.handleCalculateDose();
            const feedback = resultsBox.innerHTML;

            tester.assert(
              feedback.includes("PLUMB'S DRUG BLOCK: MDR1 MUTATION AWARENESS"),
              "Calculator must trigger Plumb's block for Max's MDR1"
            );
            tester.assert(
              feedback.includes('Administration aborted'),
              'Must abort ivermectin administration'
            );
          }
        );

        // ----------------------------------------------------
        // TEST 4: PLUMB'S DOSING WARNINGS - Meloxicam kidney fail block
        // ----------------------------------------------------
        tester.runTest(
          'Meloxicam NSAID CKD perfusion locks',
          "Plumb's Dose Engine",
          'Asserts that NSAID Meloxicam is hard-blocked if active kidney azotemia indicators are present.',
          () => {
            const oliver = app.getPatient('pet-1'); // Azotemic Feline

            app.activePatientId = oliver.id;

            const drugSelect = document.getElementById('dose-drug-select');
            drugSelect.innerHTML = `<option value="Meloxicam">Meloxicam</option>`;
            drugSelect.value = 'Meloxicam';

            const rateInput = document.getElementById('dose-rate-input');
            rateInput.value = 0.2;

            const resultsBox = document.getElementById('dose-calculator-result');
            resultsBox.innerHTML = '';

            const ehr = window.vetpmsEHR;
            ehr.handleCalculateDose();
            const feedback = resultsBox.innerHTML;

            tester.assert(
              feedback.includes("PLUMB'S DRUG BLOCK: ACUTE RENAL CONTRAINDICATION"),
              'Meloxicam prohibited for renal patients'
            );
            tester.assert(
              feedback.includes('prohibited for Oliver'),
              'Alert targets specific azotemic cat name'
            );
          }
        );

        // ----------------------------------------------------
        // TEST 5: MEEH BSA ANATOMICAL FORMULAS
        // ----------------------------------------------------
        tester.runTest(
          'Meeh BSA Feline vs Canine formulas',
          'Clinical Calcs',
          'Asserts that feline (K=10.0) and canine (K=10.1) Meeh body surface area math calculations compute correctly from time-series weight parameters.',
          () => {
            const oliver = app.getPatient('pet-1'); // Feline 4.2kg
            // Feline BSA = 10.0 * (4.2^(2/3)) / 100 = 10.0 * 2.603 / 100 = 0.260 m2
            const oliverK = 10.0;
            const oliverBsa = parseFloat(
              ((oliverK * Math.pow(oliver.weight, 2 / 3)) / 100).toFixed(3)
            );
            tester.assertEqual(oliverBsa, 0.26, 'Oliver feline BSA must equal 0.260 m²');

            const duke = app.getPatient('pet-4'); // Greyhound 31.8kg
            // Canine BSA = 10.1 * (31.8^(2/3)) / 100 = 10.1 * 10.04 / 100 = 1.014 m2
            const dukeK = 10.1;
            const dukeBsa = parseFloat(((dukeK * Math.pow(duke.weight, 2 / 3)) / 100).toFixed(3));
            tester.assertEqual(dukeBsa, 1.014, 'Duke canine BSA must equal 1.014 m²');
          }
        );

        // ----------------------------------------------------
        // TEST 6: MODIFIED TRIADAN PATHOLOGY & Dental EXTRACTIONS AUTO-BILL
        // ----------------------------------------------------
        tester.runTest(
          'Modified Triadan extractions billing triggers',
          'Dental & Billing',
          'Asserts that logging surgical extraction on a Modified Triadan tooth maps pathology and auto-adds extraction fees to the checkout invoice.',
          () => {
            const ehr = window.vetpmsEHR;
            const oliver = app.getPatient('pet-1');

            const startingInvoicesCount = oliver.invoices.length;

            app.activePatientId = oliver.id;

            // Perform dental surgery extraction on tooth 104
            ehr.activeTooth = '104';

            const pMock = document.getElementById('dental-pathology');
            pMock.innerHTML = `<option value="Complicated Crown Fracture">CCF</option>`;
            pMock.value = 'Complicated Crown Fracture';

            const aMock = document.getElementById('dental-action');
            aMock.innerHTML = `<option value="Surgical Extraction (Invoiced)">SE</option>`;
            aMock.value = 'Surgical Extraction (Invoiced)';

            ehr.handleSaveToothPathology();

            tester.assertEqual(
              oliver.invoices.length,
              startingInvoicesCount + 1,
              'Invoice must carry exactly one new line item'
            );
            const extractionItem = oliver.invoices.find((i) =>
              i.item.includes('Triadan Tooth 104')
            );
            tester.assert(extractionItem, 'Extraction of Triadan 104 successfully recorded');
            tester.assertEqual(
              extractionItem.price,
              185.0,
              'Surgical Extraction fee is standard $185.00'
            );
          }
        );

        // ----------------------------------------------------
        // TEST 7: RECOVER 2024 CPR RESUSCITATION VOLUMES
        // ----------------------------------------------------
        tester.runTest(
          'RECOVER CPR Emergency drug volumes',
          'Emergency Care',
          'Asserts that Critical patients pull exact weights to calculate precise volumes of epinephrine (0.01mg/kg at 1mg/mL).',
          () => {
            const max = app.getPatient('pet-3'); // 34.1kg Boxer

            // Epinephrine Vol = (34.1 * 0.01) / 1.0 = 0.341 mL -> 0.34mL
            const expectedEpiVol = ((max.weight * 0.01) / 1.0).toFixed(2);
            tester.assertEqual(
              expectedEpiVol,
              '0.34',
              '34.1kg dog requires exactly 0.34mL of Epinephrine 1:1000'
            );

            const oliver = app.getPatient('pet-1'); // 4.2kg Cat
            const expectedFelineEpiVol = ((oliver.weight * 0.01) / 1.0).toFixed(2);
            tester.assertEqual(
              expectedFelineEpiVol,
              '0.04',
              '4.2kg cat requires exactly 0.04mL of Epinephrine 1:1000'
            );
          }
        );

        // ----------------------------------------------------
        // TEST 8: GREYHOUND DIAGNOSTIC REFERENCE RANGE ANOMALY
        // ----------------------------------------------------
        tester.runTest(
          'Greyhound CBC hematology reference offsets',
          'Diagnostics Hub',
          'Asserts that Greyhound diagnostic testing uses shifted baselines (higher HCT, lower PLT) to bypass false positive bone-marrow biopsy alerts.',
          () => {
            const labs = window.vetpmsLabs;
            const duke = app.getPatient('pet-4'); // Greyhound

            const greyhoundPayload = labs.generateDiagnosticBiochemPayload('Duke', 'Canine');

            // Asserts Duke has standard high HCT and low PLT, mapped as normal greyhound levels
            tester.assertEqual(
              greyhoundPayload.HCT,
              61.2,
              'Greyhound hematocrit runs elevated standard (61.2%)'
            );
            tester.assertEqual(
              greyhoundPayload.PLT,
              105.0,
              'Greyhound platelets runs lower standard (105 x10^9/L)'
            );

            // Run reference check
            const ref = labs.referenceRanges.Greyhound;
            tester.assert(
              greyhoundPayload.HCT >= ref.HCT.low && greyhoundPayload.HCT <= ref.HCT.high,
              'Greyhound high HCT falls within breed reference range limits'
            );
            tester.assert(
              greyhoundPayload.PLT >= ref.PLT.low && greyhoundPayload.PLT <= ref.PLT.high,
              'Greyhound low PLT falls within breed reference range limits'
            );
          }
        );

        // ----------------------------------------------------
        // TEST 9: DEA PERPETUAL CONTAINERS DEPLETION & ASAP 4.2B COMPILE
        // ----------------------------------------------------
        tester.runTest(
          'DEA Container depletion and ASAP 4.2B Batching',
          'DEA Regulatory Logs',
          'Verifies container-level decrements (CON-K092 vial depletion), witness auth constraints, and raw PMP ASAP text compiling.',
          () => {
            const substances = window.vetpmsSubstances;
            const oliver = app.getPatient('pet-1');

            // Locate container CON-K092 (10mL remaining Ketamine)
            const con = app.state.drugContainers.find((c) => c.containerId === 'CON-K092');
            tester.assertEqual(
              con.volume,
              10.0,
              'Container CON-K092 starts with exactly 10mL Ketamine'
            );

            // Withdraw 10.0mL to deplete the container
            // Populate selects and mock inputs
            substances.populateModalSelects();
            substances.drugSelect.value = 'sub-1'; // Ketamine
            substances.patientSelect.value = oliver.id;
            document.getElementById('draw-amount').value = 10.0;
            document.getElementById('draw-wasted').value = 0.0;
            document.getElementById('draw-reason').value = 'Exploratory surgical anesthesia';

            const vetSelect = document.getElementById('draw-vet-select');
            vetSelect.innerHTML = `<option value="Dr. Jeffery Powell">Dr. Jeffery Powell</option>`;
            vetSelect.value = 'Dr. Jeffery Powell';

            document.getElementById('draw-witness-pin').value = '1234'; // verified witness Tech

            substances.handleSubstanceWithdrawal();

            // Asserts CON-K092 is depleted and marked inactive
            tester.assertEqual(con.volume, 0.0, 'CON-K092 volume decremented to 0mL');
            tester.assertEqual(
              con.depleted,
              true,
              'CON-K092 correctly marked as depleted and archived'
            );

            // Asserts ASAP 4.2B compiles transaction segments
            const outputBox = document.getElementById('asap-output');
            outputBox.value = '';

            substances.generateASAP42BText();
            const asapText = outputBox.value;

            tester.assert(asapText.includes('TH*4.2*CURES'), 'ASAP compiles valid header segment');
            tester.assert(
              asapText.includes('PAT*'),
              'ASAP compiles valid patient demographic segment'
            );
            tester.assert(asapText.includes('DSP*'), 'ASAP compiles valid drug dispense segment');
            tester.assert(asapText.includes('TP*'), 'ASAP compiles valid trailer segment block');
          }
        );

        // ----------------------------------------------------
        // TEST 10: MISSED-CHARGE CAPTURE DIFF ENGINE
        // ----------------------------------------------------
        tester.runTest(
          'Commercial Missed-Charge Capture Diff secures leaked revenue',
          'Financial Engine',
          'Asserts that unbilled DEA logs or SOAP plans are caught by the billing diff compiler and auto-billed to invoice in 1 click.',
          () => {
            const billing = window.vetpmsBilling;
            const oliver = app.getPatient('pet-1');

            // Assert a Ketamine draw exists in substances audit log for Oliver, but remove from invoices
            oliver.invoices = oliver.invoices.filter((i) => !i.item.includes('Controlled Med'));

            // Force missed charge check
            billing.activePatientId = oliver.id;
            const panel = document.getElementById('missed-charge-panel');
            panel.innerHTML = '';

            billing.reconcileMissedCharges();

            tester.assert(
              billing.missedCharges.length > 0,
              'Billing diff engine captures unbilled controlled medication logged in substances'
            );
            const missedItem = billing.missedCharges.find((m) => m.item.includes('Controlled Med'));
            tester.assert(missedItem, 'Reconciler successfully flags unbilled Ketamine draw');

            // Trigger Auto-Capture and verify invoice merge
            billing.handleAutoCaptureLeakedRevenue(oliver);
            const invoicedItem = oliver.invoices.find((i) => i.item.includes('Controlled Med'));
            tester.assert(
              invoicedItem,
              'Auto-Capture merges unbilled drug draw into active invoice'
            );
          }
        );

        // RENDER TEST CARDS
        renderTestReport(tester.results);
      }

      function renderTestReport(results) {
        const container = document.getElementById('test-cards-container');
        container.innerHTML = '';

        let passedCount = 0;
        let failedCount = 0;

        results.forEach((test, idx) => {
          if (test.passed) passedCount++;
          else failedCount++;

          const card = document.createElement('div');
          card.className = 'glass-card test-card';

          const badgeClass = test.passed ? 'test-pass' : 'test-fail';
          const badgeLabel = test.passed ? 'passed' : 'failed';

          let assertionsHTML = test.assertions
            .map(
              (a) => `
          <div class="assertion-row">
            <span style="color: ${a.passed ? 'var(--text-secondary)' : '#f87171'};">${a.message}</span>
            <span class="assertion-status" style="color: ${a.passed ? 'var(--success)' : 'var(--danger)'};">
              ${a.passed ? '✓ PASS' : '✗ FAIL'}
            </span>
          </div>
        `
            )
            .join('');

          card.innerHTML = `
          <div style="display:flex; justify-content:between; align-items:center;">
            <span style="font-size:11px; text-transform:uppercase; color:var(--text-muted); font-weight:700;">${test.category}</span>
            <span class="test-result-badge ${badgeClass}">${badgeLabel}</span>
          </div>
          <h3 style="font-size:16px; font-weight:800; color:#fff;">${test.name}</h3>
          <p style="font-size:12px; color:var(--text-secondary); line-height:1.4;">${test.description}</p>
          <div style="display:flex; flex-direction:column; gap:6px; margin-top:8px; border-top:1px solid var(--glass-border); padding-top:10px;">
            ${assertionsHTML}
          </div>
        `;

          container.appendChild(card);
        });

        document.getElementById('metric-total').innerText = results.length;
        document.getElementById('metric-passed').innerText = passedCount;
        document.getElementById('metric-failed').innerText = failedCount;

        fetch('http://localhost:8000/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            total: results.length,
            passed: passedCount,
            failed: failedCount,
            details: results.map((r) => ({
              name: r.name,
              passed: r.passed,
              assertions: r.assertions,
            })),
          }),
        }).catch((err) => {});
      }

      // Run automatically on load
      window.addEventListener('load', () => {
        setTimeout(runAllTests, 500);
      });
    </script>
  </body>
</html>
